name: Assets Registrations Staff CD

on:
  push:
    branches:
      - main
      - feature*
      - hotfix*
    paths:
      - "jobs/permanent/assets-registrations-staff/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy To"
        required: true
        type: choice
        options:
        - dev
        - test
        - sandbox
        - prod

jobs:
  ppr-assets-registrations-staff-cd:
    uses: bcgov/bcregistry-sre/.github/workflows/backend-job-cd.yaml@main
    with:
      target: ${{ inputs.target }}
      app_name: "ppr-assets-reg-staff"
      cd_runner_version: "1.0.8"
      working_directory: "./jobs/permanent/assets-registrations-staff"
    secrets:
      WORKLOAD_IDENTIFY_POOLS_PROVIDER: ${{ secrets.WORKLOAD_IDENTIFY_POOLS_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}