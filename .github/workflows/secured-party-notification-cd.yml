name: Secured Party Notification CD

on:
  push:
    branches:
      - main
      - feature*
      - hotfix*
    paths:
      - "jobs/permanent/secured-party-notification/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy To"
        required: true
        type: choice
        options:
        - dev
        - test
        - sandbox
        - prod

jobs:
  ppr-secured-party-cd:
    uses: bcgov/bcregistry-sre/.github/workflows/backend-job-cd.yaml@main
    with:
      target: ${{ inputs.target }}
      cd_runner_version: "1.0.8"
      app_name: "ppr-secured-party"
      working_directory: "./jobs/permanent/secured-party-notification"
    secrets:
      WORKLOAD_IDENTIFY_POOLS_PROVIDER: ${{ secrets.WORKLOAD_IDENTIFY_POOLS_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
